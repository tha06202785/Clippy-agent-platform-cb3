<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Demo - Clippy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
        }
        
        .logo-icon {
            font-size: 1.5rem;
        }
        
        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .demo-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
        
        .demo-notice {
            background: rgba(59, 130, 246, 0.1);
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <span class="logo-icon">📎</span>
            <span class="logo-text">Clippy Demo</span>
        </a>
        <a href="/" class="back-btn">← Back to Home</a>
    </header>
    
    <div class="demo-container">
        <iframe src="/demo-video.html" title="Clippy Platform Demo"></iframe>
    </div>
    
    <div class="demo-notice">
        🎬 Interactive Demo • Scroll to navigate slides • 10 scenes showcasing Clippy's AI-powered real estate features
    </div>

    <script>
        // If opened in a modal/popup, allow parent to close
        if (window.opener) {
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    window.close();
                }
            });
        }
    </script>
</body>
</html>
