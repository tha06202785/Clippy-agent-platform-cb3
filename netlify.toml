[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# Webhook endpoint - MUST be first
[[redirects]]
  from = "/webhook/*"
  to = "/.netlify/functions/:splat"
  status = 200

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback - LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
