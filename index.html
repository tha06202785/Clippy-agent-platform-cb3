<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Clippy - Real Estate AI Platform</title>
    
    <!-- Demo Modal - Early Load -->
    <script>
      (function() {
        'use strict';
        
        window.CLIPPY_DEMO = {
          modal: null,
          
          createModal: function() {
            if (this.modal) return;
            
            var div = document.createElement('div');
            div.innerHTML = `
              <div style="position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 20px;">
                <div style="position: relative; width: 100%; max-width: 1200px; height: 90vh; background: #0f172a; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;">
                  <div style="display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div style="display: flex; align-items: center; gap: 10px;">
                      <span style="font-size: 1.3rem;">📎</span>
                      <span style="font-weight: 700; color: #fff;">Clippy Demo</span>
                    </div>
                    <button onclick="window.CLIPPY_DEMO.close()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; padding: 8px 16px; border-radius: 6px;">✕ Close</button>
                  </div>
                  <iframe src="/demo-video.html" style="flex: 1; width: 100%; border: none;"></iframe>
                </div>
              </div>
            `;
            document.body.appendChild(div);
            this.modal = div.firstElementChild;
          },
          
          open: function() {
            this.createModal();
            this.modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          },
          
          close: function() {
            if (this.modal) {
              this.modal.style.display = 'none';
              document.body.style.overflow = '';
            }
          }
        };
        
        // Capture phase click interceptor
        document.addEventListener('click', function(e) {
          var target = e.target;
          while (target && target !== document.body) {
            var text = (target.textContent || '').toLowerCase().trim();
            if (text.includes('watch demo') || text.includes('▶') || text.includes('play')) {
              e.preventDefault();
              e.stopPropagation();
              window.CLIPPY_DEMO.open();
              return false;
            }
            target = target.parentElement;
          }
        }, true);
        
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') window.CLIPPY_DEMO.close();
        });
        
        console.log('✅ Clippy Demo ready');
      })();
    </script>
    
    <script type="module" src="/client/App.tsx"></script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
